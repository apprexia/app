<button class="sidebar-toggle" (click)="toggleSidebar()">
    <i class="bi bi-list text-info"></i>
</button>

@if (opened()) {
    <div class="sidebar-overlay" (click)="closeSidebar()"></div>
}

<nav class="sidebar" [class.open]="opened()">

    <button class="sidebar-close" (click)="closeSidebar()">
        <i class="bi bi-x-lg"></i>
    </button>

    <div routerLink="/" class="sidebar__logo">
        <img src="logo.png" alt="Apprexia" width="150">
    </div>

    <div class="sidebar__section">

        <span class="sidebar__label">Analyse</span>

        <a routerLink="/analyze" routerLinkActive="active" class="sidebar__item" (click)="closeSidebar()">
            <i class="bi bi-plus-circle"></i>
            <span>Nouvelle analyse</span>
        </a>

        <a routerLink="/analyze-list" routerLinkActive="active" class="sidebar__item" (click)="closeSidebar()">
            <i class="bi bi-clock-history"></i>
            <span>Mes analyses</span>
        </a>

        <!--        <a routerLink="/compare" routerLinkActive="active" class="sidebar__item" (click)="closeSidebar()">-->
        <!--            <i class="bi bi-columns-gap"></i>-->
        <!--            <span>Comparateur</span>-->
        <!--        </a>-->

        <a routerLink="/favorites" routerLinkActive="active" class="sidebar__item" (click)="closeSidebar()">
            <i class="bi bi-heart"></i>
            <span>Favoris</span>
        </a>

    </div>

    <div class="sidebar__divider"></div>

    <div class="sidebar__section">

        <span class="sidebar__label">Espace client</span>

        <a routerLink="/account" routerLinkActive="active" class="sidebar__item" (click)="closeSidebar()">
            <i class="bi bi-person"></i>
            <span>Mon compte</span>
        </a>

        <a routerLink="/credits" routerLinkActive="active" class="sidebar__item" (click)="closeSidebar()">
            <i class="bi bi-shop-window"></i>
            <span>Apprexia store</span>
        </a>

    </div>

    <div class="sidebar__divider"></div>

    <div class="sidebar__section">
        <span class="sidebar__label">Légal</span>

        <a routerLink="/cgu" routerLinkActive="active" class="sidebar__item" (click)="closeSidebar()">
            <i class="bi bi-file-earmark-text"></i>
            <span>CGU</span>
        </a>

        <a routerLink="/cgv" routerLinkActive="active" class="sidebar__item" (click)="closeSidebar()">
            <i class="bi bi-file-earmark-text"></i>
            <span>CGV</span>
        </a>

        <a routerLink="/rgpd" routerLinkActive="active" class="sidebar__item" (click)="closeSidebar()">
            <i class="bi bi-file-earmark-text"></i>
            <span>Politique de confidentialité</span>
        </a>

        <a routerLink="/" class="sidebar__item" (click)="closeSidebar()">
            <i class="bi bi-info-circle"></i>
            <span>A propos de nous</span>
        </a>
    </div>

    <div class="sidebar__divider"></div>

    <div class="sidebar__section">
        <a class="sidebar__item" (click)="logout()">
            <i class="bi bi-power text-apprexia"></i>
            <span class="text-apprexia">Déconnexion</span>
        </a>
    </div>
</nav>
